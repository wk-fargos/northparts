services:
  - type: web
    name: northparts
    runtime: python
    rootDir: northparts
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: northparts-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: northparts-db
    databaseName: northparts
    user: northparts
    plan: free
